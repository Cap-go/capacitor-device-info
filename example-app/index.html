<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>@capgo/capacitor-device-info Example</title>
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='12' fill='%2317202a'/%3E%3Cpath d='M18 18h28v28H18z' fill='%23f7f5ef'/%3E%3Cpath d='M24 26h16v4H24zm0 8h16v4H24z' fill='%231f7a8c'/%3E%3C/svg%3E"
    />
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <main class="shell">
      <header>
        <div>
          <h1>Device Info</h1>
          <p>@capgo/capacitor-device-info</p>
        </div>
        <span id="monitoring-state">Idle</span>
      </header>

      <section class="toolbar" aria-label="Device info actions">
        <button id="read-once" type="button">Read once</button>
        <button id="start-monitoring" type="button">Start stream</button>
        <button id="stop-monitoring" type="button">Stop</button>
        <button id="get-version" type="button">Version</button>
      </section>

      <section class="metrics" aria-label="Latest metrics">
        <article>
          <span>CPU</span>
          <strong id="cpu-value">--</strong>
        </article>
        <article>
          <span>Memory</span>
          <strong id="memory-value">--</strong>
        </article>
        <article>
          <span>Storage</span>
          <strong id="storage-value">--</strong>
        </article>
        <article>
          <span>GPU</span>
          <strong id="gpu-value">--</strong>
        </article>
        <article>
          <span>Sensors</span>
          <strong id="sensor-value">--</strong>
        </article>
      </section>

      <section class="chart-panel" aria-label="Metric history">
        <canvas id="metrics-chart" width="900" height="320"></canvas>
        <div class="legend">
          <span class="cpu">CPU</span>
          <span class="memory">Memory</span>
          <span class="storage">Storage</span>
        </div>
      </section>

      <pre id="plugin-output">No sample yet.</pre>
    </main>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
